<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2d8a4e">
    <title>رَيْم - RYM Darija Algérien</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Inter:wght@300;400;500;600;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background: linear-gradient(135deg, #f0f7f2 0%, #ffffff 100%); min-height: 100vh; }
        body { font-family: 'Inter', sans-serif; background: transparent; color: #1a1a1a; position: relative; display: flex; flex-direction: column; min-height: 100vh; }
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; opacity: 0.12; background-image: linear-gradient(45deg, #1a5c2a 25%, transparent 25%), linear-gradient(-45deg, #1a5c2a 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #1a5c2a 75%), linear-gradient(-45deg, transparent 75%, #1a5c2a 75%); background-size: 40px 40px; pointer-events: none; z-index: -1; }
        .navbar { background: #ffffff; padding: 12px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 20; border-bottom: 2px solid #2d8a4e; }
        .logo { font-family: 'Playfair Display'; font-size: 18px; font-weight: 900; color: #2d8a4e; flex: 1; text-align: center; }
        .logo-ar { font-family: 'Amiri'; font-size: 13px; color: #2d8a4e; text-align: center; font-weight: 700; }
        .profile-svg { width: 36px; height: 36px; background: linear-gradient(135deg, #2d8a4e, #1a5c2a); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .profile-svg svg { width: 20px; height: 20px; stroke: white; stroke-width: 1.5; }
        .slider { background: #ffffff; padding: 10px 12px; overflow-x: auto; border-bottom: 1px solid #e0e0e0; }
        .slider-inner { display: flex; gap: 8px; }
        .cat-btn { padding: 8px 14px; background: #f0f7f2; border: 2px solid #2d8a4e; border-radius: 20px; color: #2d8a4e; cursor: pointer; white-space: nowrap; font-size: 12px; font-weight: 600; flex-shrink: 0; }
        .cat-btn.active { background: #2d8a4e; color: #fff; }
        .content-wrapper { flex: 1; overflow-y: auto; padding-bottom: 110px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 16px 12px; }
        @media (min-width: 480px) { .grid { grid-template-columns: 1fr 1fr; } }
        .card { background: #ffffff; border: 2px solid #2d8a4e; border-radius: 14px; padding: 14px; cursor: pointer; text-align: center; }
        .card-emoji { font-size: 28px; margin-bottom: 8px; }
        .card-title { font-family: 'Playfair Display'; font-size: 12px; font-weight: 700; color: #2d8a4e; }
        .detail-header { background: #ffffff; padding: 12px; border-bottom: 2px solid #2d8a4e; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
        .detail-header h2 { font-size: 16px; flex: 1; }
        .back-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #2d8a4e; }
        .detail-content { padding: 16px 12px; }
        .tabs { display: flex; gap: 10px; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; overflow-x: auto; margin-bottom: 16px; }
        .tab { background: none; border: none; cursor: pointer; font-family: 'Playfair Display'; font-size: 12px; font-weight: 700; color: #999; white-space: nowrap; padding: 6px 0; }
        .tab.active { color: #2d8a4e; border-bottom: 3px solid #2d8a4e; margin-bottom: -13px; padding-bottom: 13px; }
        .content { display: none; }
        .content.active { display: block; }
        .qcm-box { background: #ffffff; border: 2px solid #2d8a4e; border-radius: 14px; padding: 16px; margin-bottom: 16px; text-align: center; }
        .qcm-word { font-family: 'Amiri'; font-size: 28px; color: #2d8a4e; font-weight: 700; margin: 12px 0; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 14px 0; }
        @media (min-width: 480px) { .options { grid-template-columns: 1fr 1fr 1fr; } }
        .option-btn { padding: 10px; background: #ffffff; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .option-btn.correct { background: #2d8a4e; color: #fff; }
        .option-btn.wrong { background: #ffebee; border-color: #d32f2f; }
        .next-btn { width: 100%; padding: 12px; background: #2d8a4e; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; display: none; font-size: 12px; }
        .cours-item { background: #f9f9f9; border-left: 4px solid #2d8a4e; padding: 12px; margin-bottom: 12px; border-radius: 6px; }
        .cours-num { font-weight: 700; color: #2d8a4e; font-size: 14px; margin-bottom: 6px; }
        .cours-text { font-size: 13px; color: #333; line-height: 1.6; }
        .ia-input { width: 100%; padding: 10px; border: 2px solid #2d8a4e; border-radius: 8px; margin-bottom: 10px; font-size: 13px; font-family: 'Amiri'; }
        .ia-btn { width: 100%; padding: 10px; background: #2d8a4e; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 10px; font-size: 12px; }
        .ia-feedback { background: #f0f7f2; border: 2px solid #2d8a4e; border-radius: 8px; padding: 12px; margin-top: 16px; font-size: 12px; }
        .bottom-buttons { position: fixed; bottom: 0; left: 0; right: 0; background: #ffffff; border-top: 2px solid #2d8a4e; padding: 6px; display: flex; gap: 6px; z-index: 100; flex-wrap: wrap; }
        .bottom-btn { flex: 1; padding: 10px 6px; background: #2d8a4e; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 11px; }
        .gap-phrase { background: #ffffff; border: 2px solid #2d8a4e; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
        .gap-text { font-family: 'Amiri'; font-size: 16px; color: #2d8a4e; line-height: 2; margin-bottom: 20px; text-align: center; }
        .gap-blank { background: #f0f7f2; border-bottom: 3px solid #2d8a4e; display: inline-block; min-width: 80px; text-align: center; font-weight: 700; margin: 0 4px; }
        .gap-blank.filled { background: #e8f5e9; color: #2d8a4e; }
        .gap-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; justify-content: center; }
        .gap-btn { padding: 8px 12px; background: #2d8a4e; color: #fff; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 12px; font-family: 'Amiri'; }
        .gap-btn.used { background: #ccc; cursor: not-allowed; opacity: 0.6; }
        .gap-reset { width: 100%; padding: 10px; background: #999; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; font-size: 12px; }
        .profile-page { display: none; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="profile-svg" onclick="openProfile()"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
        <div style="flex: 1; text-align: center;"><div class="logo">RYM</div><div class="logo-ar">رَيْم</div></div>
        <button style="background: none; border: none; font-size: 24px; cursor: pointer;">🇩🇿</button>
    </div>
    
    <div class="slider"><div class="slider-inner" id="cats"></div></div>
    
    <div class="content-wrapper">
        <div id="home" style="display: block;">
            <div class="grid" id="grid"></div>
        </div>
        
        <div id="detail" style="display: none;">
            <div class="detail-header"><button class="back-btn" onclick="backHome()">←</button><h2 id="title"></h2></div>
            <div class="detail-content">
                <div class="tabs" id="tabs"></div>
                <div id="cours" class="content active"></div>
                <div id="cartes" class="content"></div>
                <div id="qcm" class="content"></div>
                <div id="phrase" class="content"></div>
                <div id="ia-tutor" class="content"></div>
            </div>
        </div>

        <div id="profile-page" class="profile-page">
            <div class="detail-header"><button class="back-btn" onclick="backHome()">←</button><h2>👤 Profil</h2></div>
            <div class="detail-content">
                <div style="background: #ffffff; border-radius: 12px; padding: 16px; margin-bottom: 16px;">
                    <div style="background: linear-gradient(135deg, #2d8a4e, #1a5c2a); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center;">
                        <p style="font-size: 24px; font-weight: 700; margin-bottom: 8px;">🎓 RYM Taleb</p>
                        <p style="font-size: 13px;">Niveau <span id="prof-level-header">1</span> • <span id="prof-xp-header">0</span> XP</p>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <div style="background: #f0f7f2; padding: 12px; border-radius: 8px; text-align: center;"><p style="font-size: 11px; color: #666; margin-bottom: 4px;">🔥 Streak</p><p style="font-size: 20px; font-weight: 700; color: #2d8a4e;"><span id="prof-streak">0</span></p></div>
                        <div style="background: #f0f7f2; padding: 12px; border-radius: 8px; text-align: center;"><p style="font-size: 11px; color: #666; margin-bottom: 4px;">⭐ XP</p><p style="font-size: 20px; font-weight: 700; color: #2d8a4e;"><span id="prof-xp">0</span></p></div>
                        <div style="background: #f0f7f2; padding: 12px; border-radius: 8px; text-align: center;"><p style="font-size: 11px; color: #666; margin-bottom: 4px;">📈 Level</p><p style="font-size: 20px; font-weight: 700; color: #2d8a4e;"><span id="prof-level">1</span></p></div>
                        <div style="background: #f0f7f2; padding: 12px; border-radius: 8px; text-align: center;"><p style="font-size: 11px; color: #666; margin-bottom: 4px;">📚 Vocab</p><p style="font-size: 20px; font-weight: 700; color: #2d8a4e;"><span id="prof-vocab">0</span></p></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-buttons">
        <button class="bottom-btn" style="background: #4caf72;" onclick="loadProfile()">📥 Load</button>
        <button class="bottom-btn" style="background: #999;" onclick="installPWA()">⬇️ Install</button>
        <button class="bottom-btn" onclick="saveProfile()">💾 Save</button>
    </div>

    <script>

            1: { text: 'Salam {1} labas {2} ?', words: ['3lik', 'kat'], answer: ['3lik', 'kat'], fr: 'Bonjour comment vas-tu?' },

            4: { text: '{1} taleb dar {2} skola', words: ['Ana', 'f'], answer: ['Ana', 'f'], fr: 'Je suis élève à l\'école' }

                { id: 2, emoji: '🔢', name: 'Khayman', vocab: [{darija:'Wahed',fr:'Un'},{darija:'Zouj',fr:'Deux'},{darija:'Tlata',fr:'Trois'},{darija:'Reb3a',fr:'Quatre'},{darija:'Khamsa',fr:'Cinq'},{darija:'Setta',fr:'Six'},{darija:'Seb3a',fr:'Sept'},{darija:'Tmanya',fr:'Huit'},{darija:'Tes3a',fr:'Neuf'},{darija:'3achra',fr:'Dix'},{darija:'Ashrin',fr:'Vingt'},{darija:'Tlatine',fr:'Trente'},{darija:'Reb3in',fr:'Quarante'},{darija:'Khamsin',fr:'Cinquante'},{darija:'Bezaf',fr:'Beaucoup'},{darija:'Chwiya',fr:'Un peu'},{darija:'Kol',fr:'Tout'},{darija:'Noss',fr:'Moitié'},{darija:'Kamel',fr:'Entier'},{darija:'Chhal',fr:'Combien'}], cours: [{num:'1. Chiffres 1-10',text:'Wahed, Zouj, Tlata, Reb3a, Khamsa, Setta, Seb3a, Tmanya, Tes3a, 3achra - MÉMORISER ABSOLUMENT!'},{num:'2. Utilisation quotidienne',text:'Ghandi zouj khouya = J\'ai deux frères. Wahed derham = Un dinar. Très utilisé!'},{num:'3. Quantités',text:'Bezaf = Beaucoup. Chwiya = Un peu. Kol = Tout. Noss = Moitié. Important pour descriptions!'},{num:'4. Commerce et marché',text:'Au souk, les chiffres sont ESSENTIELS. Chhal? = Combien? Drahi ghali = C\'est cher! Important!'}] },
                { id: 3, emoji: '👨‍👩‍👧', name: 'Familla', vocab: [{darija:'Yemma',fr:'Mère'},{darija:'Baba',fr:'Père'},{darija:'Khouya',fr:'Frère'},{darija:'Khti',fr:'Sœur'},{darija:'Jeddi',fr:'Grand-père'},{darija:'Jedda',fr:'Grand-mère'},{darija:'3ammi',fr:'Oncle paternel'},{darija:'3amti',fr:'Tante paternelle'},{darija:'Khali',fr:'Oncle maternel'},{darija:'Khalti',fr:'Tante maternelle'},{darija:'Weld',fr:'Garçon'},{darija:'Bent',fr:'Fille'},{darija:'Rajel',fr:'Mari'},{darija:'Mrat',fr:'Épouse'},{darija:'Tfol',fr:'Enfant'},{darija:'Tofla',fr:'Fillette'}], cours: [{num:'1. Famille nucléaire',text:'Yemma = Mère. Baba = Père. Khouya = Frère. Khti = Sœur. ESSENTIELS - les entendre partout!'},{num:'2. Générations',text:'Jeddi = Grand-père. Jedda = Grand-mère. Weld = Garçon. Bent = Fille. Structure familiale importante!'},{num:'3. Tantes et oncles',text:'3ammi (oncle père\'s side). Khali (oncle mère\'s side). Respecter les aînés = culture algérienne!'},{num:'4. Importance culturelle',text:'La FAMILLE est CENTRALE en Algérie! Utilisez ces mots avec respect et affection. Base de la vie sociale.'}] },

                { id: 6, emoji: '👗', name: 'Libas', vocab: [{darija:'Serwal',fr:'Pantalon'},{darija:'Qamis',fr:'Chemise'},{darija:'Triko',fr:'T-shirt'},{darija:'Sabat',fr:'Chaussures'},{darija:'Jacket',fr:'Veste'},{darija:'Manteau',fr:'Manteau'},{darija:'Robe',fr:'Robe'},{darija:'Foulard',fr:'Foulard'},{darija:'Ceinture',fr:'Ceinture'},{darija:'Casquette',fr:'Casquette'},{darija:'Djellaba',fr:'Djellaba'},{darija:'Hijab',fr:'Hijab'},{darija:'Sarouel',fr:'Pantalon ample'},{darija:'Gandora',fr:'Robe tunique'},{darija:'Lebes',fr:'Porter (vêtir)'},{darija:'9ala3',fr:'Enlever'},{darija:'Lonia',fr:'Camisole'},{darija:'Ghantwi',fr:'Sweat-shirt'},{darija:'Tkha',fr:'Costume'},{darija:'Babouche',fr:'Babouche'}], cours: [{num:'1. Vêtements modernes',text:'Serwal = Pantalon. Qamis = Chemise. Triko = T-shirt. Jacket = Veste. Vêtements quotidiens!'},{num:'2. Chaussures et accessoires',text:'Sabat = Chaussures. Ceinture = Ceinture. Foulard = Foulard. Importants pour l\'apparence.'},{num:'3. Vêtements traditionnels',text:'Djellaba = vêtement traditionnel. Hijab = voile. Toujours respecter traditions vestimentaires!'},{num:'4. Fashion en Algérie',text:'La mode est IMPORTANTE en Algérie moderne. Mélange traditions et style contemporain très vivant!'}] }

        function makePhrase() { const phrases = Object.values(PHRASES_TEMPLATES); if (gapState.current >= phrases.length) gapState.current = 0; const phrase = phrases[gapState.current]; const words = phrase.words.slice(); let html = '<div class="gap-phrase"><p style="font-size: 12px; color: #666; margin-bottom: 10px;">Français: ' + phrase.fr + '</p><div class="gap-text">'; phrase.text.split('{').forEach((part, i) => { if (i === 0) { html += part; } else { const match = part.match(/(\d+)(.*)/); if (match) { const idx = parseInt(match[1]); const rest = match[2]; const filled = gapState.filled[idx-1] || ''; html += '<span class="gap-blank' + (filled ? ' filled' : '') + '">' + filled + '</span>' + rest; } } }); html += '</div><div class="gap-buttons">'; words.forEach((w, i) => { const used = gapState.filled.includes(w); html += '<button class="gap-btn' + (used ? ' used' : '') + '" ' + (used ? 'disabled' : 'onclick="fillGap(\'' + w + '\')"') + '>' + w + '</button>'; }); html += '</div><button class="gap-reset" onclick="resetGap()">Reset</button><button class="ia-btn" style="margin-top: 20px;" onclick="checkGap()">Verifier</button></div>'; document.getElementById('phrase').innerHTML = html; }

        function renderIATutor() { if (!currentTheme || !currentTheme.vocab) return; iaTutor.word = currentTheme.vocab[Math.floor(Math.random() * currentTheme.vocab.length)]; makeIATutor(); }
        function makeIATutor() { if (!iaTutor.word) return; const html = '<div style="padding: 20px;"><div style="background: #f9f9f9; border-left: 4px solid #2d8a4e; padding: 16px; margin-bottom: 16px; border-radius: 6px;"><p style="font-size: 12px; color: #666; margin-bottom: 8px;">Traduis en Darija:</p><p style="font-family: Amiri; font-size: 18px; color: #2d8a4e; font-weight: 700; margin: 0;">' + iaTutor.word.fr + '</p></div><textarea id="ia-ans" class="ia-input" style="height: 60px;" placeholder="Darija..."></textarea><button onclick="checkIATutor()" class="ia-btn">Verifier</button><button onclick="showIA()" class="ia-btn" style="background: #999;">Voir reponse</button><div id="ia-fb"></div></div>'; document.getElementById('ia-tutor').innerHTML = html; }
        function checkIATutor() { const ans = document.getElementById('ia-ans').value.trim().toLowerCase(); const fb = document.getElementById('ia-fb'); if (ans === iaTutor.word.darija.toLowerCase()) { fb.innerHTML = '<div class="ia-feedback" style="background: #c8e6c9; border-color: #4caf72; color: #2e7d32; text-align: center; font-weight: 600;">✅ BRAVO! Correct!</div>'; awardXP(30); setTimeout(() => renderIATutor(), 2000); } else { fb.innerHTML = '<div class="ia-feedback" style="background: #ffcdd2; border-color: #d32f2f; color: #b71c1c;">❌ Reponse: <span style="font-family: Amiri; font-size: 16px;">' + iaTutor.word.darija + '</span></div>'; } }
        function showIA() { document.getElementById('ia-fb').innerHTML = '<div class="ia-feedback" style="background: #e3f2fd; border-color: #2d8a4e; text-align: center;"><span style="font-family: Amiri; font-size: 18px; color: #2d8a4e; font-weight: 700;">' + iaTutor.word.darija + '</span></div>'; }

        function openProfile() { document.getElementById('home').style.display = 'none'; document.getElementById('detail').style.display = 'none'; document.getElementById('profile-page').style.display = 'block'; updateProfileDisplay(); }

        function updateProfileDisplay() { document.getElementById('prof-level-header').textContent = state.level; document.getElementById('prof-xp-header').textContent = state.xp; document.getElementById('prof-level').textContent = state.level; document.getElementById('prof-xp').textContent = state.xp; document.getElementById('prof-streak').textContent = state.streak; document.getElementById('prof-vocab').textContent = Object.values(CATEGORIES).flat().reduce((sum, t) => sum + (t.vocab ? t.vocab.length : 0), 0); }

        function saveProfile() { localStorage.setItem('profile', JSON.stringify(profile)); alert('✅ Mahfad!'); }
        function loadProfile() { const saved = localStorage.getItem('profile'); if (saved) { profile = JSON.parse(saved); updateProfileDisplay(); alert('✅ Charge!'); } }
        function installPWA() { if (deferredPrompt) { deferredPrompt.prompt(); } else { alert('Ouvre sur HTTPS pour installer'); } }

        window.addEventListener('beforeinstallprompt', event => { event.preventDefault(); deferredPrompt = event; });

        renderCats(); renderThemes('Fondamentaux'); updateProfileDisplay();
        function backHome() { document.getElementById('detail').style.display = 'none'; document.getElementById('profile-page').style.display = 'none'; document.getElementById('home').style.display = 'block'; }
    </script>
</body>
</html>
