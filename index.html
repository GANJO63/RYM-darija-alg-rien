var C2="<div class='cours-title'>FAMILLE ET RELATIONS</div><div class='cours-section'><div class='cours-section-title'>SECTION 1 - Parents Directs</div><div class='cours-content'>Yemma (mere)<br>Baba (pere)<br>Khouya (frere)<br>Khti (soeur)<br>Weld (fils)<br>Bent (fille)</div></div><div class='cours-section'><div class='cours-section-title'>SECTION 2 - Grands-Parents</div><div class='cours-content'>Jeddi (grand-pere)<br>Jedda (grand-mere)<br>Jdoud (grands-parents)<br>3ammi (oncle paternel)<br>3amma (tante paternelle)<br>Khalti (tante maternelle)<br>Khali (oncle maternel)</div></div><div class='cours-section'><div class='cours-section-title'>SECTION 3 - Famille Etendue</div><div class='cours-content'>Cousin (cousin)<br>Cousine (cousine)<br>Neffe (neveu)<br>Niece (niece)<br>Bel3a (mari/gendre)<br>Rjayla (femme/belle-fille)</div></div><div class='cours-section'><div class='cours-section-title'>SECTION 4 - Possession Familiale</div><div class='cours-content'>3andi (j ai)<br>3andek (tu as)<br>3andou (il a)<br>3andha (elle a)<br>3andna (nous avons)<br>3andkoum (vous avez)<br>3andhom (ils ont)</div></div><div class='cours-section'><div class='cours-section-title'>SECTION 5 - Presentation</div><div class='cours-content'>Hada (ceci/celui-ci)<br>Hadi (celle-ci)<br>Hadouk (ceux-la)<br>Haddak (celui-la)<br>Haddik (celle-la)</div></div><div class='cours-section'><div class='cours-section-title'>SECTION 6 - Benedictions</div><div class='cours-content'>Rabbi yahfed (que dieu le protege)<br>Allah ykhalihom (que dieu les garde)<br>Inchallah (si dieu le veut)<br>Hamdoulah (grace a dieu)<br>Khalliha 3la rabbi (laisse ca a dieu)</div></div><div class='cours-section'><div class='cours-section-title'>SECTION 7 - Affection</div><div class='cours-content'>Habib (mon amour)<br>Habibti (ma cherie)<br>Galbi (mon coeur)<br>Rouhi (mon ame)<br>3aziz (cher)<br>Ghali (precieux)<br>M7boub (aime)</div></div><div class='cours-section'><div class='cours-section-title'>SECTION 8 - Relations Sociales</d var C3="<div class='cours-title'>MAISON ET VIE QUOTIDIENNE</div><div class='cours-section'><div class='cours-section-title'>SECTION 1 - Pieces de la Maison</div><div class='cours-content'>Dar (maison)<br>Bit (chambre)<br>Kouzina (cuisine)<br>Saloun (salon)<br>7ammam (salle de bain)<br>Balcoun (balcon)<br>Sehdoun (terrasse)</div></div><div class='cours-section'><div class='cours-section-title'>SECTION 2 - Objets et Mobilier</div><div class='cours-content'>Bab (porte)<br>Chbak (fenetre)<br>Jdar (mur)<br>Srira (lit)<br>Tabl (table)<br>Kursi (chaise)<br>Sofa (canape)<br>Doulap (placard)</div></div><div class='cours-section'><div class='cours-section-title'>SECTION 3 - Electromenagers</div><div class='cours-content'>Tele (television)<br>Frijider (refrigerateur)<br>Fornnou (four)<br>Ghassala (machine a laver)<br>Lamba (lampe)<br>Telephone (telephone)</div></div><div class='cours-section'><div class='cours-section-title'>SECTION 4 - Actions Quotidiennes</div><div class='cours-content'>Nod (dormir)<br>Ghsel (laver)<br>Lebes (habiller)<br>Nakol (manger)<br>Nchreb (boire)<br>Nqra (etudier)</div></div><div class='cours-section'><div class='cours-section-title'>SECTION 5 - Activites du Matin</div><div class='cours-content'>Sbaht (je me reveille)<br>Ghsel wjahi (je lave mon visage)<br>Bras (je me brosse)<br>Lebes (je m habille)<br>Nakol ftor (je prends le petit dej)</div></div><div class='cours-section'><div class='cours-section-title'>SECTION 6 - Menage</div><div class='cours-content'>Kenes (balayer)<br>Mes7 (essuyer)<br>Reteb (ranger)<br>Neddif (nettoyer)<br>Ghsel tajin (laver les plats)<br>Khrej skharat (sortir les ordures)</div></div><div class='cours-section'><div class='cours-section-title'>SECTION 7 - Cuisine</div><div class='cours-content'>Tebkha (cuisine)<br>Takdher (preparer)<br>Chwie (faire cuire)<br>9al3 (cuire a feu doux)<br>Taqla (faire sauter)<br>Jri7 (couper)</div></div><div class='cours-section'><div class='cours-section-title'>SECTION 8 - Demandes</div><div class='cours-content'>3tini (donne-moi)<br>Jibli (apporte-moi)<br>Khrej (sors)<br>Dkhel (entre)<br>Jib (cherche)<br>Akhd (prends)<br>Khalled (range)</div></div><div class='cours-section'><div class='cours-section-title'>SECTION 9 - Dialogue Maison</div><div class='cours-content'>-Wesh dir fel dar?<br>-Rani nqra w nkhdem.<br>-Jibli atay stp.<br>-Sah labas.<br>-Dar mlih braka.<br>-Ih rabbina yafik.</div></div><div class='cours-section'><div class='cours-section-title'>SECTION 10 - A RETENIR</div><div class='cours-content'>Dar = maison<br>Bit = chambre<br>Nod = dormir<br>Nakol = manger<br>Kenes = balayer</div></div>";

var state={xp:0,level:1},current=null,flip={},qIdx=0,pIdx=0,phraseSelected=[],usedWords=[];

function loadState(){state.xp=parseInt(localStorage.getItem('xp')||'0');state.level=parseInt(localStorage.getItem('level')||'1');}
function saveState(){localStorage.setItem('xp',state.xp);localStorage.setItem('level',state.level);}
function award(n){state.xp+=n;if(state.xp>=500){state.level++;state.xp=0;}saveState();updateProfile();}
function updateProfile(){var lvl=document.getElementById('prof-level');var xp=document.getElementById('prof-xp');if(lvl){lvl.textContent=state.level;}if(xp){xp.textContent=state.xp;}}

function renderHome(){var h='';DATA.forEach(function(t,i){h+='<div class="course-card" onclick="selectCourse('+i+')"><div class="course-emoji">'+t.emoji+'</div><div class="course-name">'+t.name+'</div></div>';});document.getElementById('grid').innerHTML=h;}

function selectCourse(idx){current=DATA[idx];document.getElementById('home').style.display='none';document.getElementById('detail').style.display='block';document.getElementById('profile-page').style.display='none';document.getElementById('title').textContent=current.name;renderTabs();}

function renderTabs(){var h='<button class="tab active" onclick="switchTab(this,0)">Cours</button><button class="tab" onclick="switchTab(this,1)">Cartes</button><button class="tab" onclick="switchTab(this,2)">QCM</button><button class="tab" onclick="switchTab(this,3)">Phrase</button><button class="tab" onclick="switchTab(this,4)">IA</button>';document.getElementById('tabs').innerHTML=h;renderCours();}

function switchTab(btn,idx){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});btn.classList.add('active');document.querySelectorAll('.content').forEach(function(c){c.classList.remove('active');});var tabs=['cours','cartes','qcm','phrase','ia-tutor'];document.getElementById(tabs[idx]).classList.add('active');if(idx===1)renderCartes();if(idx===2)renderQCM();if(idx===3)renderPhrase();if(idx===4)renderIA();}

function renderCours(){document.getElementById('cours').innerHTML=current.cours;}

function renderCartes(){flip={};makeCartes();}

function makeCartes(){var h='<div style="padding:16px;">';current.vocab.forEach(function(v,i){var flipped=flip[i]||false;var word=flipped?v.f:v.d;var bg=flipped?'#f0f7f2':'#2d8a4e';var tc=flipped?'#2d8a4e':'#fff';h+='<div class="cartes-card" style="background:'+bg+'" onclick="flip['+i+']=!flip['+i+'];makeCartes();award(2);"><div class="cartes-text" style="color:'+tc+';">'+word+'</div></div>';});h+='</div>';document.getElementById('cartes').innerHTML=h;}

function renderQCM(){qIdx=0;makeQCM();}

function makeQCM(){if(!current||qIdx>=current.vocab.length){var bonus=Math.min(100,current.vocab.length*5);document.getElementById('qcm').innerHTML='<p style="text-align:center;padding:20px;color:#2d8a4e;font-weight:700;font-size:18px;">QCM COMPLET! +'+bonus+' XP</p>';award(bonus);return;}var w=current.vocab[qIdx];var opts=[w.f];var others=current.vocab.filter(function(v){return v.f!==w.f;});for(var i=0;i<2&&i<others.length;i++){opts.push(others[i].f);}opts.sort(function(){return Math.random()-0.5;});var h='<div class="qcm-box"><p style="font-size:14px;color:#666;margin-bottom:12px;">Traduis ce mot darija:</p><p class="qcm-word">'+w.d+'</p><div class="options">';opts.forEach(function(o){h+='<button class="option-btn" onclick="chkQCM(this,\''+o+'\')">'+o+'</button>';});h+='</div><button class="next-btn" id="nxt" onclick="qIdx++;makeQCM();" style="margin-top:20px;">Suivant</button><p style="text-align:center;font-size:13px;margin-top:16px;font-weight:700;color:#2d8a4e;">'+(qIdx+1)+'/'+current.vocab.length+'</p></div>';document.getElementById('qcm').innerHTML=h;}

function chkQCM(btn,correct){document.querySelectorAll('.option-btn').forEach(function(b){b.disabled=true;});if(btn.textContent===correct){btn.classList.add('correct');award(10);}else{btn.classList.add('wrong');document.querySelectorAll('.option-btn').forEach(function(b){if(b.textContent===correct)b.classList.add('correct');});}document.getElementById('nxt').style.display='block';}

function renderPhrase(){pIdx=0;makePhrase();}

function makePhrase(){var courseIdx=DATA.indexOf(current);var coursePhrases=PHRASES_BY_COURSE[courseIdx]||[];if(coursePhrases.length===0){document.getElementById('phrase').innerHTML='<p style="text-align:center;padding:20px;color:#999;font-weight:700;">Phrases bientot disponibles!</p>';return;}if(pIdx>=coursePhrases.length){document.getElementById('phrase').innerHTML='<p style="text-align:center;padding:20px;color:#2d8a4e;font-weight:700;">PHRASES COMPLETES +100 XP</p>';award(100);return;}var p=coursePhrases[pIdx];phraseSelected=[];var shuffled=p.darija.slice();for(var i=shuffled.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var temp=shuffled[i];shuffled[i]=shuffled[j];shuffled[j]=temp;}var h='<div class="phrase-question"><div class="phrase-question-text">'+p.fr+'</div></div><div class="phrase-bubbles" id="phrase-bubbles">';shuffled.forEach(function(word,idx){h+='<span class="bubble" data-word="'+word+'" data-idx="'+idx+'">'+word+'</span>';});h+='</div><div id="phrase-order" style="text-align:center;min-height:50px;margin-bottom:16px;padding:12px;background:#f9f9f9;border-radius:12px;display:flex;flex-wrap:wrap;justify-content:center;gap:8px;align-items:center;"></div><button class="phrase-btn" onclick="checkPhrase()">Verifier</button><p style="text-align:center;font-size:13px;margin-top:12px;font-weight:700;color:#2d8a4e;">'+(pIdx+1)+'/'+coursePhrases.length+'</p><div id="phrase-feedback"></div>';document.getElementById('phrase').innerHTML=h;setTimeout(function(){document.querySelectorAll('.bubble').forEach(function(el){el.addEventListener('click',function(){var word=this.dataset.word;if(this.classList.contains('used')){var pos=phraseSelected.indexOf(word);if(pos!==-1)phraseSelected.splice(pos,1);this.classList.remove('used');this.style.display='';}else{phraseSelected.push(word);this.classList.add('used');this.style.display='none';}updatePhraseDisplay();});});},100);}

function updatePhraseDisplay(){var el=document.getElementById('phrase-order');if(!el)return;var h='';phraseSelected.forEach(function(w){h+='<span class="bubble" style="background:#2d8a4e;color:#fff;cursor:pointer;" onclick="removeWord(\''+w+'\')">'+w+'</span>';});el.innerHTML=h;}
function removeWord(word){var pos=phraseSelected.indexOf(word);if(pos!==-1)phraseSelected.splice(pos,1);document.querySelectorAll('#phrase-bubbles .bubble').forEach(function(el){if(el.dataset.word===word&&el.classList.contains('used')){el.classList.remove('used');el.style.display='';}});updatePhraseDisplay();}

function checkPhrase(){var courseIdx=DATA.indexOf(current);var coursePhrases=PHRASES_BY_COURSE[courseIdx]||[];var p=coursePhrases[pIdx];var selected=phraseSelected.join(' ');var correct=p.order.join(' ');if(selected===correct){document.getElementById('phrase-feedback').innerHTML='<div class="ia-feedback" style="background:#c8e6c9;border-color:#4caf72;color:#2e7d32;text-align:center;font-weight:700;">BRAVO!</div>';award(15);setTimeout(function(){pIdx++;makePhrase();},1200);}else{document.getElementById('phrase-feedback').innerHTML='<div class="ia-feedback" style="background:#ffcdd2;border-color:#d32f2f;">Pas correct!</div>';}}

function renderIA(){if(!current)return;var w=current.vocab[Math.floor(Math.random()*current.vocab.length)];var h='<div style="padding:20px;"><div style="background:#f9f9f9;border-left:4px solid #2d8a4e;padding:16px;margin-bottom:16px;border-radius:6px;"><p style="font-size:12px;color:#666;margin-bottom:8px;">Traduis en Darija:</p><p style="font-family:Amiri;font-size:18px;color:#2d8a4e;font-weight:700;">'+w.f+'</p></div><textarea id="ia-in" class="ia-input" style="height:60px;"></textarea><button class="ia-btn" onclick="chkIA(\''+w.d+'\')">Verifier</button><button class="ia-btn" onclick="showIA(\''+w.d+'\')" style="background:#999;">Voir</button><div id="ia-fb"></div></div>';document.getElementById('ia-tutor').innerHTML=h;}

function chkIA(correct){var a=document.getElementById('ia-in').value.trim().toLowerCase();if(a===correct.toLowerCase()){document.getElementById('ia-fb').innerHTML='<div class="ia-feedback" style="background:#c8e6c9;border-color:#4caf72;color:#2e7d32;text-align:center;font-weight:700;">BRAVO!</div>';award(30);setTimeout(function(){renderIA();},2000);}else{document.getElementById('ia-fb').innerHTML='<div class="ia-feedback" style="background:#ffcdd2;border-color:#d32f2f;">Reponse: '+correct+'</div>';}}

function showIA(correct){document.getElementById('ia-fb').innerHTML='<div class="ia-feedback" style="background:#e3f2fd;border-color:#2d8a4e;text-align:center;"><span style="font-family:Amiri;font-size:18px;color:#2d8a4e;font-weight:700;">'+correct+'</span></div>';}

function backHome(){document.getElementById('detail').style.display='none';document.getElementById('home').style.display='block';}

function openProfile(){document.getElementById('home').style.display='none';document.getElementById('detail').style.display='none';document.getElementById('profile-page').style.display='block';updateProfile();}

function closeProfile(){document.getElementById('profile-page').style.display='none';document.getElementById('home').style.display='block';}

document.getElementById('prof-btn').onclick=openProfile;
document.getElementById('back-btn').onclick=backHome;
document.getElementById('back-btn2').onclick=closeProfile;
