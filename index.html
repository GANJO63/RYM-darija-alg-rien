            if (!currentTheme || !currentTheme.vocab || currentTheme.vocab.length === 0) return [];
            
            const phrases = [];
            const vocab = currentTheme.vocab.slice(0, 8);
            
            if (!Array.isArray(vocab)) return [];
            
            (vocab || []).forEach((word, idx) => {
                if (!word || !word.darija) return;
                
                const distractors = currentTheme.vocab
                    .filter((_, i) => i !== idx)
                    .slice(0, 3)
                    .map(w => w.darija)
                    .filter(d => d);
                
                const phrase1 = `_____ jaj ${word.darija} bzaf!`;
                phrases.push({
                    text: phrase1,
                    blank: word.darija,
                    distractors: distractors
                });
                
                if (idx % 2 === 0) {
                    const phrase2 = `Had _____ zwin u mzian!`;
                    phrases.push({
                        text: phrase2,
                        blank: word.darija,
                        distractors: distractors
                    });
                }
            });
            
            return phrases;
        }

                document.getElementById('prof-email').value = profile.email; 
                document.getElementById('prof-pays').value = profile.pays; 
                document.getElementById('prof-bio').value = profile.bio; 
            }
            if (document.getElementById('prof-xp')) document.getElementById('prof-xp').textContent = state.xp; 
            if (document.getElementById('prof-xp-header')) document.getElementById('prof-xp-header').textContent = state.xp; 
            if (document.getElementById('prof-level')) document.getElementById('prof-level').textContent = state.level; 
            if (document.getElementById('prof-level-header')) document.getElementById('prof-level-header').textContent = state.level; 
            if (document.getElementById('prof-streak')) document.getElementById('prof-streak').textContent = state.streak; 
            if (document.getElementById('prof-date')) document.getElementById('prof-date').textContent = profile.dateInscrit || 'Taadi'; 
            if (document.getElementById('prof-vocab')) document.getElementById('prof-vocab').textContent = allVocab.length; 
        }

        function saveProfile() { 
            const nomEl = document.getElementById('prof-nom');
            const emailEl = document.getElementById('prof-email');
            const paysEl = document.getElementById('prof-pays');
            const bioEl = document.getElementById('prof-bio');
            if (nomEl && emailEl && paysEl && bioEl) {
                profile = { nom: nomEl.value, email: emailEl.value, pays: paysEl.value, bio: bioEl.value, dateInscrit: profile.dateInscrit || new Date().toLocaleDateString() }; 
                localStorage.setItem('profile', JSON.stringify(profile)); 
                alert('✅ Mahfad!'); 
            }
        }

        function loadProfile() { 
            const saved = localStorage.getItem('profile'); 
            if (saved) { 
                profile = JSON.parse(saved); 
                updateProfileDisplay(); 
                alert('✅ Chargé!'); 
            } else { 
                alert('❌ Walo'); 
            } 
        }

        function installPWA() { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(choice => { if (choice.outcome === 'accepted') alert('✅ Sbt!'); deferredPrompt = null; }); } else { const isLocal = window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'; if (isLocal) { alert('📱 Sab na3 local:\n\n1. Ouvre sur HTTPS (GitHub Pages)\n2. Ou ajoute manuellement a homescreen\n\nWala probleme, app marche normalement!'); } else { alert('⬇️ Marche pas hadak browser\n\nEssay autre browser (Chrome, Firefox)'); } } }

        window.addEventListener('beforeinstallprompt', event => { event.preventDefault(); deferredPrompt = event; });

        initVocab(); updateStats(); renderCats(); renderThemes('Asass'); if (!profile.dateInscrit) { profile.dateInscrit = new Date().toLocaleDateString(); localStorage.setItem('profile', JSON.stringify(profile)); }

        function backHome() { document.getElementById('detail').style.display = 'none'; document.getElementById('ia-page').style.display = 'none'; document.getElementById('profile-page').style.display = 'none'; document.getElementById('home').style.display = 'block'; }
    </script>
</body>
</html>
