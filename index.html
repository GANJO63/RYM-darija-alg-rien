        *{margin:0;padding:0;box-sizing:border-box}html{background:linear-gradient(135deg,#f0f7f2,#fff);min-height:100vh}body{font-family:Inter,sans-serif;background:0;color:#1a1a1a;display:flex;flex-direction:column;min-height:100vh}body::before{content:"";position:fixed;top:0;left:0;right:0;bottom:0;opacity:0.12;background-image:linear-gradient(45deg,#1a5c2a 25%,transparent 25%),linear-gradient(-45deg,#1a5c2a 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#1a5c2a 75%),linear-gradient(-45deg,transparent 75%,#1a5c2a 75%);background-size:40px 40px;pointer-events:none;z-index:-1}.navbar{background:#fff;padding:12px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20;border-bottom:2px solid #2d8a4e}.prof-btn{width:36px;height:36px;background:linear-gradient(135deg,#2d8a4e,#1a5c2a);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:0}.logo{font-family:Playfair Display;font-size:18px;font-weight:900;color:#2d8a4e;flex:1;text-align:center}.logo-ar{font-family:Amiri;font-size:13px;color:#2d8a4e;font-weight:700}.flag-btn{background:0;border:0;font-size:24px;cursor:pointer}.content-wrapper{flex:1;overflow-y:auto;padding-bottom:80px}.grid-container{padding:12px 12px;max-width:600px;margin:0 auto}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(min-width:480px){.grid{grid-template-columns:1fr 1fr 1fr}}.course-card{background:#fff;border:2px solid #2d8a4e;border-radius:14px;padding:12px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100px;transition:all 0.2s}.course-card:hover{background:#f0f7f2;transform:scale(1.05)}.course-emoji{font-size:32px;margin-bottom:6px}.course-name{font-size:11px;font-weight:700;color:#2d8a4e;line-height:1.3}.detail-header{background:#fff;padding:12px;border-bottom:2px solid #2d8a4e;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}.back-btn{background:0;border:0;font-size:18px;cursor:pointer;color:#2d8a4e}.detail-content{padding:24px 16px}.tabs{display:flex;gap:10px;border-bottom:2px solid #e0e0e0;padding-bottom:10px;overflow-x:auto;margin-bottom:16px}.tab{background:0;border:0;cursor:pointer;font-family:Playfair Display;font-size:12px;font-weight:700;color:#999;white-space:nowrap;padding:6px 0}.tab.active{color:#2d8a4e;border-bottom:3px solid #2d8a4e;margin-bottom:-13px;padding-bottom:13px}.content{display:none}.content.active{display:block}.cours-title{font-family:Playfair Display;font-size:32px;font-weight:900;color:#fff;margin-bottom:32px;text-align:center;padding:24px;background:linear-gradient(135deg,#2d8a4e,#1a5c2a);border-radius:14px;border:3px solid #2d8a4e;box-shadow:0 4px 12px rgba(45,138,78,0.2)}.cours-section{background:#fff;border:3px solid #2d8a4e;border-radius:14px;padding:24px;margin-bottom:28px;box-shadow:0 2px 8px rgba(45,138,78,0.1)}.cours-section-title{font-family:Playfair Display;font-size:20px;font-weight:900;color:#fff;background:linear-gradient(135deg,#2d8a4e,#1a5c2a);margin:-24px -24px 16px -24px;padding:16px 24px;border-radius:11px 11px 0 0;margin-bottom:20px;padding-bottom:16px;border-bottom:0}.cours-content{font-size:16px;line-height:2.4;color:#333;letter-spacing:0.5px;word-spacing:0.1em}.cours-content strong{color:#2d8a4e;font-weight:900;display:block;margin-top:12px;margin-bottom:8px;font-size:16px}.cartes-card{background:#fff;border:2px solid #2d8a4e;border-radius:12px;padding:20px;margin-bottom:10px;cursor:pointer;text-align:center;min-height:100px;display:flex;align-items:center;justify-content:center}.cartes-text{font-family:Amiri;font-size:20px;font-weight:700;color:#2d8a4e}.qcm-box{background:#fff;border:2px solid #2d8a4e;border-radius:14px;padding:16px;margin-bottom:16px;text-align:center}.qcm-word{font-family:Amiri;font-size:28px;color:#2d8a4e;font-weight:700;margin:12px 0}.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}@media(min-width:480px){.options{grid-template-columns:1fr 1fr 1fr}}.option-btn{padding:10px;background:#fff;border:2px solid #e0e0e0;border-radius:10px;cursor:pointer;font-size:11px;font-weight:600}.option-btn.correct{background:#2d8a4e;color:#fff}.option-btn.wrong{background:#ffebee;border-color:#d32f2f}.next-btn{width:100%;padding:12px;background:#2d8a4e;color:#fff;border:0;border-radius:10px;cursor:pointer;font-weight:600;display:none;font-size:12px;margin-top:12px}.bubble{display:inline-block;background:#fff;border:2px solid #2d8a4e;border-radius:20px;padding:8px 16px;margin:6px 4px;cursor:pointer;font-size:12px;font-weight:600;color:#2d8a4e;transition:all 0.2s}.bubble:hover{background:#f0f7f2;transform:scale(1.05)}.bubble.selected{background:#2d8a4e;color:#fff}.phrase-question{text-align:center;margin-bottom:16px;padding:16px;background:#f0f7f2;border-radius:8px}.phrase-question p{font-family:Amiri;font-size:20px;color:#2d8a4e;font-weight:700;margin-bottom:8px}.phrase-selected{text-align:center;min-height:40px;margin-bottom:16px;padding:12px;background:#fff;border:2px dashed #2d8a4e;border-radius:8px;font-family:Amiri;font-size:16px;color:#2d8a4e}.phrase-bubbles{text-align:center;margin-bottom:16px;padding:12px;background:#f9f9f9;border-radius:8px}.phrase-btn{width:100%;padding:10px;background:#2d8a4e;color:#fff;border:0;border-radius:8px;cursor:pointer;font-weight:600;margin-bottom:8px;font-size:12px}.ia-input{width:100%;padding:10px;border:2px solid #2d8a4e;border-radius:8px;margin-bottom:10px;font-size:13px;font-family:Amiri}.ia-btn{width:100%;padding:10px;background:#2d8a4e;color:#fff;border:0;border-radius:8px;cursor:pointer;font-weight:600;margin-bottom:10px;font-size:12px}.ia-feedback{background:#f0f7f2;border:2px solid #2d8a4e;border-radius:8px;padding:12px;margin-top:16px;font-size:12px}.bottom-buttons{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #2d8a4e;padding:6px;display:flex;gap:6px;z-index:100}.bottom-btn{flex:1;padding:10px;background:#2d8a4e;color:#fff;border:0;border-radius:8px;cursor:pointer;font-weight:600;font-size:11px}.prof-card{background:linear-gradient(135deg,#2d8a4e,#1a5c2a);color:#fff;padding:20px;border-radius:12px;margin-bottom:20px;text-align:center}.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.stat-box{background:#f0f7f2;padding:12px;border-radius:8px;text-align:center}.stat-val{font-size:24px;font-weight:700;color:#2d8a4e}

    <script>
var C1="<div class='cours-title'>🗣️ CONVERSATION QUOTIDIENNE</div><div class='cours-section'><div class='cours-section-title'>📌 SECTION 1 - Salutations Base</div><div class='cours-content'>Saha (salut)<br/>Wesh rak (comment vas-tu)<br/>Labas (ça va bien)<br/>Labas hamdoulah (ça va bien grâce à dieu)<br/>Wesh kayan (quoi de neuf)<br/>Kifach rak (comment tu vas)<br/>Salam alikum (bonjour)<br/>Alikum assalam (bonjour)<br/>Saha sahbiyi (salut mon ami)</div></div><div class='cours-section'><div class='cours-section-title'>❓ SECTION 2 - Questions Basiques</div><div class='cours-content'>Win rak (où es-tu)<br/>Wach rak dir (qu'est-ce que tu fais)<br/>Wach kayen (qu'est-ce qu'il y a)<br/>Wash baraka (comment ça va)<br/>Win ruh (où vas-tu)<br/>Shkoun (qui)<br/>Wach (quoi)<br/>Walin (pourquoi)<br/>Kifach (comment)</div></div><div class='cours-section'><div class='cours-section-title'>📍 SECTION 3 - Localisation</div><div class='cours-content'>Rani fel dar (je suis à la maison)<br/>Rani fel khedma (je suis au travail)<br/>Rani fel 3arbi (je suis dans la rue)<br/>Rani fel souk (je suis au marché)<br/>Rani fel mdrassa (je suis à l'école)<br/>Rani fel café (je suis au café)<br/>Rani jay (j'arrive)<br/>Rani roh (je vais)</div></div><div class='cours-section'><div class='cours-section-title'>⚡ SECTION 4 - Actions Quotidiennes</div><div class='cours-content'>Nqra (j'étudie)<br/>Nkhdem (je travaille)<br/>Nakol (je mange)<br/>Nchreb (je bois)<br/>Nrouh (je vais)<br/>Nkun (je suis)<br/>Ndor (je cherche)<br/>Nktel (j'appelle)</div></div><div class='cours-section'><div class='cours-section-title'>⏰ SECTION 5 - Temps et Moments</div><div class='cours-content'>Derk (maintenant)<br/>Ghodwa (demain)<br/>Bareh (hier)<br/>Sbah (matin)<br/>Tomobil (après-midi)<br/>Lehla (nuit)<br/>Djahra (l'après-midi)<br/>Zman (temps)</div></div><div class='cours-section'><div class='cours-section-title'>💭 SECTION 6 - Expressions Essentielles</div><div class='cours-content'>Makach (rien)<br/>Walou (rien)<br/>Allah ghaleb (on n'y peut rien)<br/>Balak (attention)<br/>Safi (d'accord)<br/>Khlas (fini)<br/>Baraka (ça suffit)<br/>Hadja (voilà)</div></div><div class='cours-section'><div class='cours-section-title'>🎭 SECTION 7 - Politesse et Respect</div><div class='cours-content'>3afak (s'il te plaît)<br/>Shukran (merci)<br/>3la 3youn (avec plaisir)<br/>Labas (bien)<br/>Salam (bonjour)<br/>Sabah el khir (bon matin)<br/>Masaa el khir (bonsoir)</div></div><div class='cours-section'><div class='cours-section-title'>🔢 SECTION 8 - Nombres Base</div><div class='cours-content'>Wahd (un) / Jouj (deux) / Tlata (trois) / Rba3a (quatre) / Khamsa (cinq)<br/>Stta (six) / Sba3a (sept) / Tmanya (huit) / Tsa3a (neuf) / 3ashara (dix)</div></div><div class='cours-section'><div class='cours-section-title'>💬 SECTION 9 - Dialogue Complet</div><div class='cours-content'><strong>-Wesh rak kho?</strong><br/>-Labas hamdoulah wesh kayen?<br/><strong>-Walou rani drek.</strong><br/>-Wesh rak dir?<br/><strong>-Rani nkhdem.</strong><br/>-Ah safi hadj'a bkher.</div></div><div class='cours-section'><div class='cours-section-title'>⭐ À RETENIR</div><div class='cours-content'><strong>Rani + lieu</strong> = je suis + lieu<br/><strong>Wesh + action</strong> = fais-tu action?<br/><strong>Win</strong> = où<br/><strong>Derk</strong> = maintenant<br/><strong>Ghodwa</strong> = demain<br/><strong>Makach</strong> = expression de résignation<br/><strong>Safi</strong> = d'accord / c'est bon</div></div>";
var C2="<div class='cours-title'>👨‍👩‍👧 FAMILLE ET RELATIONS</div><div class='cours-section'><div class='cours-section-title'>👶 SECTION 1 - Parents Directs</div><div class='cours-content'>Yemma (mère)<br/>Baba (père)<br/>Khouya (frère)<br/>Khti (sœur)<br/>Weld (fils)<br/>Bent (fille)<br/>Taleb (étudiant/fils)<br/>Binet (petite fille)</div></div><div class='cours-section'><div class='cours-section-title'>👴 SECTION 2 - Grands-Parents</div><div class='cours-content'>Jeddi (grand-père)<br/>Jedda (grand-mère)<br/>Jdoud (grands-parents)<br/>3ammi (oncle paternel)<br/>3amma (tante paternelle)<br/>Khalti (tante maternelle)<br/>Khali (oncle maternel)</div></div><div class='cours-section'><div class='cours-section-title'>🤝 SECTION 3 - Famille Etendue</div><div class='cours-content'>Cousin (cousin)<br/>Cousine (cousine)<br/>Neffe (neveu)<br/>Niece (nièce)<br/>Bel3a (mari/gendre)<br/>Rjayla (femme/belle-fille)<br/>Salli (allié)<br/>Shrek (associé familial)</div></div><div class='cours-section'><div class='cours-section-title'>🎁 SECTION 4 - Possession Familiale</div><div class='cours-content'>3andi (j'ai)<br/>3andek (tu as)<br/>3andou (il a)<br/>3andha (elle a)<br/>3andna (nous avons)<br/>3andkoum (vous avez)<br/>3andhom (ils ont)<br/>3andhom (elles ont)</div></div><div class='cours-section'><div class='cours-section-title'>👉 SECTION 5 - Présentation</div><div class='cours-content'>Hada (ceci/celui-ci)<br/>Hadi (celle-ci)<br/>Hadouk (ceux-là)<br/>Haddak (celui-là)<br/>Haddik (celle-là)<br/>Hadchi (cet objet-ci)<br/>Hadchak (cet objet-là)</div></div><div class='cours-section'><div class='cours-section-title'>🙏 SECTION 6 - Bénédictions</div><div class='cours-content'>Rabbi yahfed (que dieu le protège)<br/>Allah ykhalihom (que dieu les garde)<br/>Inchallah (si dieu le veut)<br/>Hamdoulah (grâce à dieu)<br/>Allah ykhlek (que dieu te préserve)<br/>Tarek (que tu sois béni)<br/>Khalliha 3la rabbi (laisse ça à dieu)</div></div><div class='cours-section'><div class='cours-section-title'>💕 SECTION 7 - Affection</div><div class='cours-content'>Habib (mon amour)<br/>Habibti (ma chérie)<br/>Galbi (mon cœur)<br/>Rouhi (mon âme)<br/>3aziz (cher)<br/>Ghali (précieux)<br/>Khass (spécial)<br/>M7boub (aimé)</div></div><div class='cours-section'><div class='cours-section-title'>👥 SECTION 8 - Relations Sociales</div><div class='cours-content'>Sahbi (ami)<br/>Lkhawa (copains/frères)<br/>Jamet (groupe d'amis)<br/>3arif (connaissance)<br/>Jar (voisin)<br/>Jara (voisine)<br/>Khass (proche)<br/>Rafiq (compagnon)</div></div><div class='cours-section'><div class='cours-section-title'>💬 SECTION 9 - Dialogue Familial</div><div class='cours-content'><strong>-Wesh yemma?</strong><br/>-Labas habibti kifach rak?<br/><strong>-Rani lab as el hamdo.</strong><br/>-Wesh baba?<br/><strong>-Rani fel khidma.</strong><br/>-Ah safi rabbi yaafik.<br/><strong>-Wesh khouya?</strong><br/>-Rani nqra lel imtihan ghodwa.</div></div><div class='cours-section'><div class='cours-section-title'>⭐ À RETENIR</div><div class='cours-content'><strong>Yemma/Baba</strong> = parents immédiats<br/><strong>Khouya/Khti</strong> = fratrie<br/><strong>Rabbi</strong> = dieu (dans bénédictions)<br/><strong>3andi</strong> = posséder<br/><strong>Hadouk</strong> = pluriel/ceux-là<br/><strong>Bénédictions</strong> = partie importante de la culture</div></div>";

            {emoji:"💼",name:"Travail, école et administration",vocab:[{d:"Khedma",f:"Travail"},{d:"Mdrassa",f:"Ecole"},{d:"Tbib",f:"Médecin"},{d:"Mouhandess",f:"Ingénieur"},{d:"Taleb",f:"Etudiant"},{d:"Imtihan",f:"Examen"}],cours:C5},
            {emoji:"🚗",name:"Déplacements et voyages",vocab:[{d:"Tomobil",f:"Voiture"},{d:"Taxi",f:"Taxi"},{d:"Train",f:"Train"},{d:"Avion",f:"Avion"},{d:"Win kayen",f:"Où"},{d:"Chhal",f:"Combien"}],cours:C6},
            {emoji:"🏥",name:"Santé et bien-être",vocab:[{d:"Tbib",f:"Médecin"},{d:"Sda3",f:"Mal tête"},{d:"Skhana",f:"Fièvre"},{d:"Dwa",f:"Médicament"},{d:"Ferhan",f:"Heureux"},{d:"Hazin",f:"Triste"}],cours:C7},
            {emoji:"⚽",name:"Football, loisirs et culture",vocab:[{d:"Kora",f:"Football"},{d:"Match",f:"Match"},{d:"But",f:"But"},{d:"Film",f:"Film"},{d:"Ghna",f:"Chanson"},{d:"Reb7",f:"Victoire"}],cours:C8},
            {emoji:"🔥",name:"Argot algérien et langage jeune",vocab:[{d:"Zahi",f:"Détendu"},{d:"Faya9",f:"Sympa"},{d:"Ghaya",f:"Super"},{d:"Wallah",f:"Je jure"},{d:"Kho",f:"Frère"},{d:"Khayeb",f:"Nul"}],cours:C9},
            {emoji:"💬",name:"Dialogues et situations réelles",vocab:[{d:"Kahwa",f:"Café"},{d:"Sou9",f:"Marché"},{d:"Troh",f:"Aller"},{d:"Sla7",f:"Bonjour"},{d:"Safi",f:"D'accord"},{d:"Makach",f:"Rien"}],cours:C10}
        ];

        var state={xp:parseInt(localStorage.getItem("xp")||"0"),level:parseInt(localStorage.getItem("level")||"1")},current=null,flip={},qIdx=0,pIdx=0,phraseSelected=[];
        function award(n){state.xp+=n;if(state.xp>=500){state.level++;state.xp=0;}localStorage.setItem("xp",state.xp);localStorage.setItem("level",state.level);updateProfile();}
        function updateProfile(){document.getElementById("prof-level").textContent=state.level;document.getElementById("prof-xp").textContent=state.xp;document.getElementById("prof-level-h").textContent=state.level;document.getElementById("prof-xp-h").textContent=state.xp;}
        function renderHome(){var h="";DATA.forEach(function(t,i){h+="<div class='course-card' onclick='selectCourse("+i+")'><div class='course-emoji'>"+t.emoji+"</div><div class='course-name'>"+t.name+"</div></div>";});document.getElementById("grid").innerHTML=h;}
        function selectCourse(idx){current=DATA[idx];document.getElementById("home").style.display="none";document.getElementById("detail").style.display="block";document.getElementById("profile-page").style.display="none";document.getElementById("title").textContent=current.name;renderTabs();}
        function renderTabs(){var h="<button class='tab active' onclick='switchTab(this,0)'>📚 Cours</button><button class='tab' onclick='switchTab(this,1)'>🃏 Cartes</button><button class='tab' onclick='switchTab(this,2)'>🎮 QCM</button><button class='tab' onclick='switchTab(this,3)'>📝 Phrase</button><button class='tab' onclick='switchTab(this,4)'>🤖 IA</button>";document.getElementById("tabs").innerHTML=h;renderCours();}
        function switchTab(btn,idx){document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});btn.classList.add("active");document.querySelectorAll(".content").forEach(function(c){c.classList.remove("active");});["cours","cartes","qcm","phrase","ia-tutor"][idx]&&document.getElementById(["cours","cartes","qcm","phrase","ia-tutor"][idx]).classList.add("active");if(idx===1)renderCartes();if(idx===2)renderQCM();if(idx===3)renderPhrase();if(idx===4)renderIA();}
        function renderCours(){document.getElementById("cours").innerHTML=current.cours;}
        function renderCartes(){flip={};makeCartes();}
        function makeCartes(){var h="<div style='padding:16px;'>";current.vocab.forEach(function(v,i){var flipped=flip[i]||false;var word=flipped?v.f:v.d;var bg=flipped?"#f0f7f2":"#2d8a4e";var tc=flipped?"#2d8a4e":"#fff";h+="<div class='cartes-card' style='background:"+bg+"' onclick='flip["+i+"]=!flip["+i+"];makeCartes();award(2);'><div class='cartes-text' style='color:"+tc+";'>"+word+"</div></div>";});h+="</div>";document.getElementById("cartes").innerHTML=h;}
        function renderQCM(){qIdx=0;makeQCM();}
        function makeQCM(){if(!current||qIdx>=current.vocab.length){document.getElementById("qcm").innerHTML="<p style='text-align:center;padding:20px;color:#2d8a4e;font-weight:700;'>✅ COMPLET +50 XP</p>";award(50);return;}var w=current.vocab[qIdx];var opts=[w.f];for(var i=0;i<3;i++){var r=current.vocab[Math.floor(Math.random()*current.vocab.length)].f;if(opts.indexOf(r)===-1)opts.push(r);}opts.sort(function(){return Math.random()-0.5;});var h="<div class='qcm-box'><p class='qcm-word'>"+w.d+"</p><div class='options'>";opts.forEach(function(o){h+="<button class='option-btn' onclick='chkQCM(this,\""+o.replace(/"/g,"&quot;")+"\")'>"+o+"</button>";});h+="</div><button class='next-btn' id='nxt' onclick='qIdx++;makeQCM();'>Suivant</button><p style='text-align:center;font-size:12px;margin-top:12px;'>"+(qIdx+1)+"/"+current.vocab.length+"</p></div>";document.getElementById("qcm").innerHTML=h;}
        function chkQCM(btn,correct){document.querySelectorAll(".option-btn").forEach(function(b){b.disabled=true;});if(btn.textContent===correct)btn.classList.add("correct");else{btn.classList.add("wrong");document.querySelectorAll(".option-btn").forEach(function(b){if(b.textContent===correct)b.classList.add("correct");});}document.getElementById("nxt").style.display="block";}
        function renderPhrase(){pIdx=0;makePhrase();}
        function makePhrase(){if(!current||pIdx>=current.vocab.length){pIdx=0;makePhrase();return;}var w=current.vocab[pIdx];phraseSelected=[];var shuffled=[w.d];for(var i=0;i<2;i++){var r=current.vocab[Math.floor(Math.random()*current.vocab.length)].d;if(shuffled.indexOf(r)===-1)shuffled.push(r);}shuffled.sort(function(){return Math.random()-0.5;});var h="<div class='phrase-question'><p>Sélectionne le mot correct:</p><p>"+w.f+"</p></div><div class='phrase-selected' id='phrase-selected'>(cliquez sur les bulles)</div><div class='phrase-bubbles'>";shuffled.forEach(function(word){h+="<span class='bubble' onclick='selectWord(\""+word+"\",\""+w.d.replace(/"/g,"&quot;")+"\")'>"+word+"</span>";});h+="</div><button class='phrase-btn' onclick='resetPhrase()'>Réinitialiser</button><button class='phrase-btn' onclick='nextPhrase()'>Suivant +15 XP</button><div id='phrase-feedback'></div>";document.getElementById("phrase").innerHTML=h;}
        function selectWord(word,correct){phraseSelected.push(word);updatePhraseSelected();if(word===correct.trim()){award(15);setTimeout(function(){pIdx++;makePhrase();},500);}}
        function updatePhraseSelected(){document.getElementById("phrase-selected").innerHTML=phraseSelected.join(" ")||"(cliquez sur les bulles)";}
        function resetPhrase(){phraseSelected=[];updatePhraseSelected();}
        function nextPhrase(){pIdx++;makePhrase();}
        function renderIA(){if(!current)return;var w=current.vocab[Math.floor(Math.random()*current.vocab.length)];var h="<div style='padding:20px;'><div style='background:#f9f9f9;border-left:4px solid #2d8a4e;padding:16px;margin-bottom:16px;border-radius:6px;'><p style='font-size:12px;color:#666;margin-bottom:8px;'>Traduis en Darija:</p><p style='font-family:Amiri;font-size:18px;color:#2d8a4e;font-weight:700;'>"+w.f+"</p></div><textarea id='ia-in' class='ia-input' style='height:60px;'></textarea><button class='ia-btn' onclick='chkIA(\""+w.d.replace(/"/g,"&quot;")+"\")'>Verifier</button><button class='ia-btn' onclick='showIA(\""+w.d.replace(/"/g,"&quot;")+"\")' style='background:#999;'>Voir</button><div id='ia-fb'></div></div>";document.getElementById("ia-tutor").innerHTML=h;}
        function chkIA(correct){var a=document.getElementById("ia-in").value.trim().toLowerCase();if(a===correct.toLowerCase()){document.getElementById("ia-fb").innerHTML="<div class='ia-feedback' style='background:#c8e6c9;border-color:#4caf72;color:#2e7d32;text-align:center;font-weight:700;'>✅ BRAVO!</div>";award(30);setTimeout(function(){renderIA();},2000);}else{document.getElementById("ia-fb").innerHTML="<div class='ia-feedback' style='background:#ffcdd2;border-color:#d32f2f;'>❌ Reponse: "+correct+"</div>";}}
        function showIA(correct){document.getElementById("ia-fb").innerHTML="<div class='ia-feedback' style='background:#e3f2fd;border-color:#2d8a4e;text-align:center;'><span style='font-family:Amiri;font-size:18px;color:#2d8a4e;font-weight:700;'>"+correct+"</span></div>";}
        function backHome(){document.getElementById("detail").style.display="none";document.getElementById("home").style.display="block";}
        function openProfile(){document.getElementById("home").style.display="none";document.getElementById("detail").style.display="none";document.getElementById("profile-page").style.display="block";updateProfile();}
        function closeProfile(){document.getElementById("profile-page").style.display="none";document.getElementById("home").style.display="block";}
        document.getElementById("prof-btn").onclick=openProfile;
        document.getElementById("back-btn").onclick=backHome;
        document.getElementById("back-btn2").onclick=closeProfile;
        document.getElementById("flag-btn").onclick=function(){alert("🇩🇿 Algérie")};
        document.getElementById("btn-load").onclick=function(){state.xp=parseInt(localStorage.getItem("xp")||"0");state.level=parseInt(localStorage.getItem("level")||"1");updateProfile();alert("✅ Chargement - XP:"+state.xp+" Level:"+state.level);};
        document.getElementById("btn-save").onclick=function(){localStorage.setItem("xp",state.xp);localStorage.setItem("level",state.level);alert("✅ Sauvegarde - XP:"+state.xp+" Level:"+state.level);};
        document.getElementById("btn-install").onclick=function(){alert("📱 Installation PWA");};
        renderHome();
    </script>
</body>
</html>
